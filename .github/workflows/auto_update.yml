name: PPIM Auto Update Dashboard

on:
  push:
    paths:
      - 'data/ppim_report_*.csv'   # รันเมื่อมี CSV ใหม่เข้า folder data/

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install pandas openpyxl

      - name: Run processor
        run: python scripts/process.py

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PPIM_Dashboard_v2.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d %H:%M')"
          git push
